name: Keep Render Bot Awake

on:
  schedule:
    # Avoid minute 0, when scheduled GitHub Actions are most likely to be delayed.
    - cron: '3-58/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Send external inbound request to Render
        shell: bash
        run: |
          set -euo pipefail
          url="https://aternos-bot-wre2.onrender.com/ping?source=github-actions&t=$(date +%s)"
          echo "Pinging $url"
          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            --max-time 90 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            "$url"
          echo
